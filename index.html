<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Layout de App */
        .app-shell { display: grid; grid-template-columns: 250px 1fr; height: 100vh; }
        
        /* Sidebar lateral (Navegación) */
        nav { background: #0a0a0a; border-right: 1px solid #1a1a1a; padding: 40px; display: flex; flex-direction: column; gap: 30px; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; color: #fff; }
        .nav-link { cursor: pointer; color: #555; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { color: #D4AF37; }

        /* Contenido (El "Stage") */
        #stage { padding: 80px; display: flex; flex-direction: column; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 24px; min-height: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="app-shell">
        <nav>
            <div class="logo">CLASSIC+</div>
            <div class="nav-link" onclick="load('LIVE')">LIVE STREAM</div>
            <div class="nav-link" onclick="load('ARCHIVE')">ARCHIVE</div>
            <div class="nav-link" onclick="load('VIDEO')">VIDEO</div>
            <div class="nav-link" onclick="load('ADVERTISING')">ADVERTISING</div>
        </nav>

        <main id="stage">
            <div class="card" id="content">
                <h1>Bienvenido al Panel</h1>
                <p>Tu sistema de gestión premium está listo.</p>
            </div>
        </main>
    </div>

    <script>
        function load(view) {
            const content = document.getElementById('content');
            content.innerHTML = `<h1>${view}</h1><p>Sistema de carga de ${view} activado.</p>`;
        }
    </script>
</body>
</html>
