<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #0A0A0A; color: #FFFFFF; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* Barra de Navegación Premium */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; border-bottom: 1px solid #333; }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li { cursor: pointer; color: #888; transition: 0.3s; }
        nav ul li:hover { color: #FFFFFF; }

        /* Área de Contenido */
        main { display: flex; justify-content: center; align-items: center; height: 70vh; text-align: center; }
        .module-box { border: 1px solid #333; padding: 40px; border-radius: 15px; width: 60%; }
        
        h2 { font-size: 2rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CLASSIC+ RADIO</div>
        <ul>
            <li>LIVE</li>
            <li>ARCHIVE</li>
            <li>VIDEO</li>
            <li>ADVERTISING</li>
        </ul>
    </nav>

    <main>
        <div class="module-box">
            <h2>Bienvenido a Classic+</h2>
            <p>Selecciona un módulo para comenzar la experiencia.</p>
        </div>
    </main>

</body>
</html>
