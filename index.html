<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classic Plus Radio</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #050505; 
            color: #fff; 
            margin: 0; 
            padding-bottom: 80px; /* Espacio para el nav fijo */
        }
        header { 
            text-align: center; 
            padding: 20px; 
            background: rgba(5, 5, 5, 0.9);
            position: sticky; top: 0; 
            border-bottom: 1px solid #222;
            z-index: 100;
        }
        .grid-container { padding: 20px; display: grid; gap: 20px; }
        .card { 
            background: #121212; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #222;
        }
        /* Barra de navegación estilo APP */
        nav {
            position: fixed; bottom: 0; width: 100%;
            background: #121212; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #333;
        }
        .nav-item { color: #888; font-size: 12px; text-transform: uppercase; }
        .active { color: #e50914; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 18px; margin: 0; letter-spacing: 2px;">CLASSIC PLUS RADIO</h1>
</header>

<main class="grid-container">
    <div class="card">
        <h3>Sesión 01</h3>
        <p style="color:#888;">Recordando los éxitos de los 70s</p>
        <button style="background:#e50914; border:none; color:white; padding:10px 20px; border-radius:8px; width:100%;">Reproducir</button>
    </div>
</main>

<nav>
    <div class="nav-item active">Inicio</div>
    <div class="nav-item">Archivo</div>
    <div class="nav-item">Favoritos</div>
</nav>

</body>
</html>
