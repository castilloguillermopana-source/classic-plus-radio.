<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; }
        
        /* Sidebar de App (Panel lateral fijo) */
        aside { width: 200px; border-right: 1px solid #333; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }
        .menu-item { cursor: pointer; color: #777; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { color: #fff; }
        
        /* Contenedor de la APP (Pantalla principal) */
        #app-viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 40px; }
        .screen { border: 1px solid #333; padding: 50px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; background: #0a0a0a; }
    </style>
</head>
<body>

    <aside>
        <div style="font-weight: 900; margin-bottom: 20px;">CLASSIC+</div>
        <div class="menu-item" onclick="loadScreen('LIVE')">LIVE</div>
        <div class="menu-item" onclick="loadScreen('ARCHIVE')">ARCHIVE</div>
        <div class="menu-item" onclick="loadScreen('VIDEO')">VIDEO</div>
        <div class="menu-item" onclick="loadScreen('ADVERTISING')">ADVERTISING</div>
    </aside>

    <main id="app-viewport">
        <div class="screen" id="current-screen">
            <h2>Bienvenido</h2>
            <p>Panel de Control Iniciado</p>
        </div>
    </main>

    <script>
        function loadScreen(name) {
            document.getElementById('current-screen').innerHTML = `<h2>${name}</h2><p>Contenido del módulo ${name} en desarrollo...</p>`;
        }
    </script>
</body>
</html>
