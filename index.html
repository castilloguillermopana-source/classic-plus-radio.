<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Plus Radio | Archivo On-Demand</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 40px 20px; 
            line-height: 1.6;
        }
        header { 
            text-align: center; 
            margin-bottom: 50px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 20px;
        }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1100px; 
            margin: auto; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 12px; 
            text-align: center; 
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }
        .card:hover { transform: translateY(-5px); border-color: #e50914; }
        .card h3 { margin: 0 0 10px 0; color: #e50914; }
        .btn-play { 
            background-color: #e50914; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>Classic Plus Radio</h1>
    <p>Archivo de Sesiones · On-Demand</p>
</header>

<main class="grid-container">
    <div class="card">
        <h3>Sesión 01</h3>
        <p>Recordando los éxitos de los 70s</p>
        <button class="btn-play">Reproducir Sesión</button>
    </div>
    <div class="card">
        <h3>Sesión 02</h3>
        <p>Especial de Jazz y Blues</p>
        <button class="btn-play">Reproducir Sesión</button>
    </div>
</main>

</body>
</html>
