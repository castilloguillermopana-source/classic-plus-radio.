<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilo general oscuro tipo consola premium */
        body { margin: 0; background: #080808; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; height: 100vh; }
        
        /* Sidebar lateral (Navegación fija) */
        .sidebar { width: 240px; background: #0d0d0d; border-right: 1px solid #1a1a1a; padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; color: #D4AF37; margin-bottom: 40px; }
        
        .btn-nav { padding: 15px; cursor: pointer; color: #666; font-weight: 600; border-radius: 12px; transition: 0.3s; }
        .btn-nav:hover { color: #fff; background: #1a1a1a; }
        .btn-nav.active { color: #D4AF37; background: #1a1a1a; border-left: 3px solid #D4AF37; }

        /* Panel principal (El "Stage") */
        .main-panel { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .view-content { width: 100%; max-width: 800px; height: 500px; border: 1px solid #222; border-radius: 20px; background: linear-gradient(145deg, #0f0f0f, #050505); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">CLASSIC+</div>
        <div class="btn-nav active" onclick="navigate(this, 'LIVE')">LIVE</div>
        <div class="btn-nav" onclick="navigate(this, 'ARCHIVE')">ARCHIVE</div>
        <div class="btn-nav" onclick="navigate(this, 'VIDEO')">VIDEO</div>
        <div class="btn-nav" onclick="navigate(this, 'ADVERTISING')">ADVERTISING</div>
    </div>

    <main class="main-panel">
        <div class="view-content" id="stage">
            <h1 id="title">LIVE</h1>
            <p id="desc">Esperando señal de transmisión...</p>
        </div>
    </main>

    <script>
        function navigate(el, module) {
            // Quitar clase active de todos
            document.querySelectorAll('.btn-nav').forEach(btn => btn.classList.remove('active'));
            // Poner clase active al seleccionado
            el.classList.add('active');
            // Cambiar contenido
            document.getElementById('title').innerText = module;
            document.getElementById('desc').innerText = `Cargando entorno de ${module}...`;
        }
    </script>
</body>
</html>
