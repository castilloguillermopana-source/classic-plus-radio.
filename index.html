<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Plus Radio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #050505; color: #fff; margin: 0; }
        
        /* Navegación */
        nav { display: flex; justify-content: center; gap: 30px; padding: 30px; border-bottom: 1px solid #222; }
        .nav-item { color: #888; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-item:hover { color: #fff; }

        /* Contenedor de Módulos */
        .container { max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
        .module { background: #121212; padding: 40px; border-radius: 16px; border: 1px solid #222; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item">LIVE</div>
        <div class="nav-item">ARCHIVE</div>
        <div class="nav-item">VIDEO</div>
        <div class="nav-item">ADVERTISING</div>
    </nav>

    <div class="container">
        <div class="module">
            <h2>Bienvenido a Classic Plus Radio</h2>
            <p style="color:#888;">Selecciona una sección en el menú superior para continuar.</p>
        </div>
    </div>

</body>
</html>
