<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Plus Radio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #050505; color: #fff; margin: 0; }
        .card { background: #121212; padding: 20px; border-radius: 16px; border: 1px solid #222; text-align: center; margin: 20px; }
        button { background: #e50914; border: none; color: white; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Sesión 01</h3>
        <p style="color:#888;">Modo Prueba: Escucha un tono</p>
        <audio id="radioStream" src="https://www.w3schools.com/html/horse.mp3"></audio>
        <button id="btnPlay" onclick="toggleRadio()">REPRODUCE</button>
    </div>

    <script>
        function toggleRadio() {
            const audio = document.getElementById('radioStream');
            const btn = document.getElementById('btnPlay');
            
            if (audio.paused) {
                audio.play();
                btn.textContent = "EN VIVO [PAUSA]";
                btn.style.background = "#333";
            } else {
                audio.pause();
                btn.textContent = "REPRODUCE";
                btn.style.background = "#e50914";
            }
        }
    </script>
</body>
</html>
