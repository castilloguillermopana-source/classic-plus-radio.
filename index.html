<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Plus Radio | Archivo On-Demand</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 40px 20px; 
        }
        header { text-align: center; padding: 60px 0; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1100px; 
            margin: auto; 
        }
        
        .card { 
            background: #121212; 
            padding: 30px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #222;
            transition: all 0.3s ease;
        }
        
        .card:hover { 
            border-color: #e50914; 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.2);
        }
        
        .btn-play { 
            background-color: transparent; 
            color: #fff; 
            border: 1px solid #e50914; 
            padding: 10px 25px; 
            border-radius: 4px; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        
        .btn-play:hover { background-color: #e50914; }
    </style>
</head>
<body>

<header>
    <h1>Classic Plus Radio</h1>
    <p>Archivo de Sesiones · On-Demand</p>
</header>

<main class="grid-container">
    <div class="card">
        <h3>Sesión 01</h3>
        <p>Recordando los éxitos de los 70s</p>
        <button class="btn-play">Reproducir</button>
    </div>
</main>

</body>
</html>
